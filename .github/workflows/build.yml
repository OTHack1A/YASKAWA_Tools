name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

# Least privilege: read-only by default. Only the release job — which must
# attach binaries to GitHub Releases — gets contents:write, scoped locally.
permissions:
  contents: read

# All third-party actions are pinned to a full commit SHA (not a movable tag)
# so a hijacked tag can never inject code into this pipeline. The trailing
# comment records the human-readable version each SHA corresponds to.
jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies (hash-locked)
        run: pip install --require-hashes -r requirements.lock

      - name: Build Windows executable
        run: pyinstaller main.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: YaskawaTools-Windows
          path: dist/YaskawaTools.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxkbcommon-x11-0 \
            libegl1 libxrandr2 libxi6 libxtst6

      - name: Install Python dependencies (hash-locked)
        run: pip install --require-hashes -r requirements.lock

      - name: Build Linux executable
        run: pyinstaller main_linux.spec

      - name: Upload Linux artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: YaskawaTools-Linux
          path: dist/YaskawaTools

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies (hash-locked)
        run: pip install --require-hashes -r requirements.lock

      - name: Build macOS app bundle
        run: pyinstaller main_macos.spec

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "YaskawaTools" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "YaskawaTools.app" 175 190 \
            --app-drop-link 425 190 \
            "dist/YaskawaTools.dmg" \
            "dist/YaskawaTools.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: YaskawaTools-macOS
          path: dist/YaskawaTools.dmg

  # ── Publish to GitHub Releases ────────────────────────────────────────────────
  # Runs only when a version tag (v*) is pushed. Collects the three platform
  # binaries built above and attaches them to the Release for that tag.
  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build-windows, build-linux, build-macos ]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create/update the GitHub Release for the tag
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Publish binaries to the Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            artifacts/YaskawaTools-Windows/YaskawaTools.exe
            artifacts/YaskawaTools-Linux/YaskawaTools
            artifacts/YaskawaTools-macOS/YaskawaTools.dmg
          generate_release_notes: false
          fail_on_unmatched_files: true
