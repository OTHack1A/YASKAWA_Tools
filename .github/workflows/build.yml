name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build Windows executable
        run: pyinstaller main.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: YaskawaTools-Windows
          path: dist/YaskawaTools.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxkbcommon-x11-0 \
            libegl1 libxrandr2 libxi6 libxtst6

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build Linux executable
        run: pyinstaller main_linux.spec

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: YaskawaTools-Linux
          path: dist/YaskawaTools
