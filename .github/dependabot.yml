# Keeps the SHA-pinned GitHub Actions up to date: Dependabot opens a PR that
# bumps the pinned commit (and its version comment) whenever a new release of
# an action is published. Python deps are pinned by hand in requirements.txt
# and locked in requirements.lock, so only the Actions ecosystem is enabled.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
